services:
  # Nginx Reverse Proxy (·ÎÄĂ HTTP żë)
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
      - llm_service

  # 1. Frontend Client
  client:
    build: 
      context: ./client
      dockerfile: Dockerfile
    restart: always

  # 2. Node.js Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    restart: always

  # 3. Python LLM Service
  llm_service:
    build:
      context: ./llm_service
      dockerfile: Dockerfile
    env_file:
      - ./llm_service/.env
    restart: always