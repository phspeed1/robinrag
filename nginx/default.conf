server {
    listen 80;
    server_name robinrag.duckdns.org; # Replace with your actual domain

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name robinrag.duckdns.org;

    # SSL Certificates (Managed by Certbot volume)
    ssl_certificate /etc/letsencrypt/live/robinrag.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/robinrag.duckdns.org/privkey.pem;

    # 1. Frontend (React Client)
    location / {
        proxy_pass http://client:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Backend API (Node.js)
    location /api/ {
        # Rewrite /api/foo -> /foo to match backend routes if needed, 
        # but usually proxy_pass with trailing slash does this auto-magic.
        proxy_pass http://server:3000/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. LLM Service (Python FastAPI)
    location /llm/ {
        proxy_pass http://llm_service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Hermes Agent (Slack Agent Dashboard)
    location /hermes/ {
        # 도커 내장 DNS 서버 주소(127.0.0.11)를 지정하여 실시간으로 hermes 이름을 해석하도록 만듭니다.
        resolver 127.0.0.11 valid=30s;
        
        # 주소를 변수로 래핑하면 Nginx가 부팅 단계에서 검사하지 않고 요청이 올 때 8642로 강제 직통 연결합니다.
        set $upstream_hermes http://hermes:8642;
        
        proxy_pass $upstream_hermes/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 및 실시간 스트리밍 터미널 로그 전송 지원
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 타임아웃을 넉넉히 주어 비서 에이전트의 대기 상태를 유지합니다.
        proxy_read_timeout 86400;
    }}
